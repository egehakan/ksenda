name: Bug report
description: Something doesn't work the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in
        as much detail as you can — incomplete reports usually
        end up with me asking the same questions back.

        **Security issues do not belong here.** Email
        `hakan@ksenda.com` instead. See [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. Numbered list preferred.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit SHA or version
      description: Output of `git rev-parse HEAD` or the deployed version.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Where are you running it?
      options:
        - Local dev (`npm run dev`)
        - Self-hosted production
        - app.ksenda.com (hosted)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste server console output, network errors, etc. Strip secrets.
      render: shell
