name: Feature request
description: Suggest an idea or enhancement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that makes you want this feature. "Nice to have" without a real use case usually doesn't land.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Ksenda to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds, other tools, or different approaches you thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues.
